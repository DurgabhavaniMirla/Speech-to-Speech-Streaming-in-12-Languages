<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Translator | Infosys Internship</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #1a1a1a;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Crucial for width */
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,123,255,0.2);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Translator AI</h1>
    <p>Seamlessly translate your videos into 12+ languages using Whisper & GoogleTrans.</p>

    <form action="/translate" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="video">Upload MP4 Video</label>
            <input type="file" name="video" id="video" accept="video/mp4" required>
        </div>

        <div class="form-group">
            <label for="dest_language">Target Language Code</label>
            <input type="text" name="dest_language" id="dest_language" placeholder="e.g., te (Telugu), hi (Hindi), fr (French)" required>
        </div>

        <button type="submit">Translate Now</button>
    </form>

    <div class="footer">
        Developed during Infosys Internship | Infosys Springboard
    </div>
</div>

</body>
</html>
